app:
    title: 'bielefeldGEOCLIENT'
    headerLogoLink: 'https://bielefeld01.de/geo/portal/onlinekarten.php'
    tooltipDelay: 50
    showNoBackground: false
    showLogin: false
    hideMetadata: true
    sidebar:
        defaultOpen: true
    
map:
    center:
        - 468152.5616
        - 5764386.17546
    centerProjection: "EPSG:25832"
    zoom: 8
    projection: "EPSG:25832"
    projectionExtent: [-46133.17, 5048875.26857567, 1206211.10142433, 6301219.54]
    maxExtent:
        - 371030.56
        - 5672454.87
        - 562875.71
        - 5818346.28
    minZoom: 6
    maxZoom: 20
    sidebar: 'overlay'
    defaultBackground: stadtplan_bi
    defaultOverlays:
        - bielefeldkarte_2022_r


backgrounds:
    explicit:
        - stadtplan_bi
        - luftbilder_bi

# Include overlay groups (override their inactive status)
groups:
    include:
        - wms_bielefeldkarte_farbe_hist
        - wms_bodenrichtwerte_2023
        - wms_luftbilder_2020

# Include overlay layers
layers:
    include:
        - bielefeldkarte_2022_r
        - bielefeldkarte_2021_r
        - bodenrichtwerte_2023_t
        - luftbilder_2020_to

components:
    search: true
    zoomControls: true
    homeButton: true
    geolocation: true
    gotoButton: true
    measure: true
    saveSettings: true
    scaleLine: true
    overviewmap: true
    sidebar: true
    catalog: true
    searchCatalog: true
    legend: true
    print: true
    draw: true

# URL sync configuration. modes: 
# 'xyz' = position/zoom only
# 'map' = 'xyz' + visible layers with opacity
# 'full' = 'xyz' + all overlay groups with per-layer visibility and opacity, encoded compactly by index
urlSync:
    mode: 'full'

searchConfig:
    - name: adress_search
      title: Adresse
      geocoder: Solr
      selected: true
      geocoderOptions:
          viewbox:
              - 8.34154267980772
              - 51.905836372029
              - 8.72247497339103
              - 52.1276204795065
          url: "https://stadtplan.bielefeld.de/search/?maxresults=20"
          method: get
      zoom: 14
      resultMarkerVisible: 0
      urlMarkerColor: E2001A
      autoSearchChars: 3
      resultMarker: 
          graphicFile: 'geocoder-marker.svg'
          graphicWidth: 32
          graphicHeight: 50
          graphicYAnchor: 50
          graphicScale: 0.75
         
geolocationConfig:
    zoom: 14
    tracking: False
    style:
        strokeColor: "#E2001A"


printConfig:
    chooseCells: True
    chooseStreetIndex: True
    conditionsOfUse: True
    downloadPrefix: bielefeldKarte-
    availableScales:
        - 500
        - 1000
        - 2500
        - 5000
        - 10000
        - 15000
    pageLayoutDefs:
        "a5-portrait":
            label: A5
            mapElementSize: [393, 554]
        "a5-landscape":
            label: A5
            mapElementSize: [554, 373]
        "a4-portrait":
            label: A4
            mapElementSize: [555, 782]
        "a4-landscape":
            label: A4
            mapElementSize: [802, 535]
        "a3-portrait":
            label: A3
            mapElementSize: [802, 1131]
        "a3-landscape":
            label: A3
            mapElementSize: [1151, 782]
        "a2-portrait":
            label: A2
            mapElementSize: [1151, 1624]
        "a2-landscape":
            label: A2
            mapElementSize: [1644, 1131]
        "a1-portrait":
            label: A1
            mapElementSize: [1644, 2324]
        "a1-landscape":
            label: A1
            mapElementSize: [2344, 1624]
        "a0-portrait":
            label: A0
            mapElementSize: [2344, 3310]
        "a0-landscape":
            label: A0
            mapElementSize: [3330, 2324]
    enabledPageLayouts:
        - "a5-portrait"
        - "a5-landscape"
        - "a4-portrait"
        - "a4-landscape"
        - "a3-portrait"
        - "a3-landscape"
        - "a2-portrait"
        - "a2-landscape"
        - "a1-portrait"
        - "a1-landscape"
        - "a0-portrait"
        - "a0-landscape"
    minPageSize: 419
    maxPageSize: 3371
